# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build and Lint Terraform Provider
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v .
      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  generate:
    name: Generate Terraform Provider Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      # We need the latest version of Terraform for our documentation generation to use
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)

  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - '1.4.*'
          - '1.5.*'
          - '1.6.*'
          - '1.7.*'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: defectdojo/django-DefectDojo
          path: ./django-DefectDojo
          ref: 8132c330119bb689505d4be649e953e9c9e827dc # v2.38.4
      - env:
          DJANGO_VERSION: "2.38.4" # v2.38.4
          COMPOSE_PROJECT_NAME: "defectdojo-test-${{ github.run_id }}-${{ strategy.job-index }}-${{ github.run_attempt }}"
        run: |
          # Debug: Show existing Docker resources
          echo "=== Existing Docker volumes before cleanup ==="
          docker volume ls | grep defectdojo || echo "No defectdojo volumes found"
          echo "=== Existing Docker containers before cleanup ==="
          docker ps -a | grep defectdojo || echo "No defectdojo containers found"
          
          # Cleanup any existing resources with our project name pattern
          CLEANUP_PATTERN="defectdojo-test-${{ github.run_id }}-${{ strategy.job-index }}"
          echo "=== Cleaning up resources matching pattern: ${CLEANUP_PATTERN} ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker rm -f || true
          docker volume ls --format "table {{.Name}}\t{{.Driver}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker volume rm -f || true
          docker network ls --format "table {{.Name}}\t{{.Driver}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker network rm || true
          
          echo "=== Starting DefectDojo with project name: defectdojo-test-${{ github.run_id }}-${{ strategy.job-index }}-${{ github.run_attempt }} ==="
          cd django-DefectDojo && ./dc-up-d.sh && \
          docker compose logs -f initializer | grep "Admin password:" | awk -F": " '{print$2}' | xargs -0 -I {} echo "DEFECTDOJO_PASSWORD={}" >> "${GITHUB_ENV}"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8 # v3.1.1
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - env:
          TF_ACC: "1"
          DEFECTDOJO_PASSWORD: ${{ env.DEFECTDOJO_PASSWORD }}
          DEFECTDOJO_USERNAME: "admin"
          DEFECTDOJO_HOST: "http://localhost:8080"
        run: go test -v -cover ./internal/provider/
        timeout-minutes: 10
      - name: Cleanup Docker resources
        if: always()
        env:
          COMPOSE_PROJECT_NAME: "defectdojo-test-${{ github.run_id }}-${{ strategy.job-index }}-${{ github.run_attempt }}"
        run: |
          echo "=== Cleaning up Docker resources ==="
          cd django-DefectDojo || exit 0
          docker compose down -v --remove-orphans || true
          
          # Additional cleanup to ensure everything is removed
          CLEANUP_PATTERN="defectdojo-test-${{ github.run_id }}-${{ strategy.job-index }}"
          echo "=== Force cleanup of remaining resources matching pattern: ${CLEANUP_PATTERN} ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker rm -f || true
          docker volume ls --format "table {{.Name}}\t{{.Driver}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker volume rm -f || true
          docker network ls --format "table {{.Name}}\t{{.Driver}}" | grep "${CLEANUP_PATTERN}" | awk '{print $1}' | xargs -r docker network rm || true
          
          echo "=== Final cleanup ==="
          docker system prune -f || true
